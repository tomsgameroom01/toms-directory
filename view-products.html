<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Products</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Inventory Matrix</h1>
        <nav>
          <a href="index.html">Dashboard</a>
          <a href="view-products.html" class="active">View Products</a>
          <a href="add-products.html">Add Products</a>
        </nav>
      </header>

      <div class="inventory-container">
        <h2>Current Master Database</h2>
        <input
          type="text"
          id="searchBox"
          class="search-bar"
          placeholder="Quick filter by code, name, color, location, or brand..."
        />

        <div class="master-table-wrapper">
          <table class="master-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Color</th>
                <th>Location</th>
                <th>Brand</th>
                <th>Length</th>
                <th>Width</th>
                <th>Height</th>
                <th>Mass</th>
                <th>Qty</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="masterInventoryBody">
              <tr>
                <td
                  colspan="11"
                  style="text-align: center; padding: 20px; color: #7f8c8d"
                >
                  Connecting to cloud database streams...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
