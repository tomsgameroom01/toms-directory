<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Links & Shop</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="asset/tgr_icon.png" />
  </head>
  <body>
    <div class="container">
      <img class="profile-img" src="asset/tgr_icon.png" alt="Profile Picture" />
      <h1>Tom's Game Room</h1>
      <p class="bio">
        Connect with me on social media or browse my shop below!
      </p>

      <div class="links-group">
        <div class="section-title">Social Media</div>
        <a
          href="https://tiktok.com/@tomsgameroom"
          target="_blank"
          class="link-card"
        >
          <img
            class="link-icon"
            src="asset/icons8-tiktok-48.png"
            alt="TikTok"
          />
          <span class="link-text">TikTok</span>
        </a>
        <a
          href="https://instagram.com/tomsgameroom"
          target="_blank"
          class="link-card"
        >
          <img
            class="link-icon"
            src="asset/icons8-instagram-48.png"
            alt="Instagram"
          />
          <span class="link-text">Instagram</span>
        </a>
        <a
          href="https://www.youtube.com/@tgr-314"
          target="_blank"
          class="link-card"
        >
          <img
            class="link-icon"
            src="asset/icons8-youtube-48.png"
            alt="YouTube"
          />
          <span class="link-text">YouTube</span>
        </a>
        <a
          href="https://wa.me/+6287882833196"
          target="_blank"
          class="link-card"
        >
          <img
            class="link-icon"
            src="asset/icons8-whatsapp-48.png"
            alt="WhatsApp"
          />
          <span class="link-text">WhatsApp</span>
        </a>
      </div>

      <div class="links-group">
        <div class="section-title">E-Commerce</div>
        <a
          href="https://shopee.co.id/shop/1869454926"
          target="_blank"
          class="link-card"
        >
          <img
            class="link-icon"
            src="asset/icons8-shopee-48.png"
            alt="Shopee"
          />
          <span class="link-text">Shopee</span>
        </a>
        <a
          href="https://blibli.onelink.me/GNtk/ijo1res5"
          target="_blank"
          class="link-card"
        >
          <img
            class="link-icon"
            src="asset/icons8-blibli-48.png"
            alt="Blibli"
          />
          <span class="link-text">Blibli</span>
        </a>
        <a
          href="https://toco.id/store/toms-game-room"
          target="_blank"
          class="link-card"
        >
          <img class="link-icon" src="asset/icons8-toco-48.png" alt="Toco" />
          <span class="link-text">Toco Id</span>
        </a>
      </div>

      <div class="footer">
        &copy; 2026 Tom's Game Room. All rights reserved.
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
